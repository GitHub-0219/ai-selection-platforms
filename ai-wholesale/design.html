<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设计页 - AI Wholesale</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="mobile-toggle">☰</button>
  <div class="overlay"></div>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><h1>AI Wholesale</h1><p>智能批发选品平台</p></div>
      <nav class="sidebar-nav" id="nav"></nav>
      <div class="sidebar-footer">
        <div class="avatar">AW</div>
        <div class="user-info"><div class="name">批发分析师</div><div class="role">高级采购顾问</div></div>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title"><span>AI</span> 产品设计</div>
          <div class="page-subtitle">AI驱动的批发产品设计与定制方案</div>
        </div>
        <div class="header-actions">
          <button class="btn btn-primary">✨ 生成方案</button>
          <button class="btn btn-outline">📁 收藏夹</button>
        </div>
      </div>

      <!-- OEM/ODM Design Templates -->
      <div class="card" style="margin-bottom:24px">
        <div class="card-header">
          <div class="card-title"><span class="icon">🖼️</span> 热门定制方案</div>
          <div style="display:flex;gap:6px">
            <span class="badge badge-accent">OEM</span>
            <span class="badge badge-primary">ODM</span>
          </div>
        </div>
        <div class="grid grid-3" id="designGrid"></div>
      </div>

      <!-- AI Mix & Match for Wholesale -->
      <div class="grid grid-2" style="margin-bottom:24px">
        <div class="card">
          <div class="card-header">
            <div class="card-title"><span class="icon">📦</span> AI组货方案</div>
            <select class="select" style="width:120px">
              <option>春夏女装</option><option>秋冬男装</option><option>运动户外</option><option>童装</option>
            </select>
          </div>
          <div id="mixMatch"></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title"><span class="icon">🎨</span> 配色方案推荐</div><span class="badge badge-warning">AI生成</span></div>
          <div id="colorTool"></div>
        </div>
      </div>

      <!-- Color Palettes -->
      <div class="card" style="margin-bottom:24px">
        <div class="card-header">
          <div class="card-title"><span class="icon">🌈</span> 批发热门色板</div>
          <button class="btn btn-outline btn-sm">🔄 换一批</button>
        </div>
        <div class="grid grid-2" id="paletteGrid"></div>
      </div>

      <!-- Material Library -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="icon">🧵</span> 面料素材库</div>
          <div style="display:flex;gap:6px">
            <span class="tag active">全部</span><span class="tag">棉</span><span class="tag">丝</span><span class="tag">化纤</span><span class="tag">功能性</span>
          </div>
        </div>
        <div class="grid grid-4" id="materialGrid"></div>
      </div>
    </main>
  </div>

  <script src="js/common.js"></script>
  <script>
    document.getElementById('nav').innerHTML = getNavHTML('design.html');

    // Design Cards
    (function() {
      const grid = document.getElementById('designGrid');
      const designs = [
        { title: '新中式盘扣T恤定制', desc: 'OEM起订500件·7天出样', tags: ['OEM', '新中式', '快速'], emoji: '🏮' },
        { title: '极简风运动鞋代工', desc: 'ODM设计+生产·30天交货', tags: ['ODM', '运动', '鞋靴'], emoji: '👟' },
        { title: '蓝牙耳机贴牌方案', desc: 'LOGO定制·MOQ 200台', tags: ['OEM', '电子', '数码'], emoji: '🎧' },
        { title: '保温杯企业礼品定制', desc: '激光刻字·礼盒包装', tags: ['定制', '礼品', '家居'], emoji: '☕' },
        { title: '数据线批量定制', desc: '长度/颜色/接口定制', tags: ['OEM', '电子', '快消'], emoji: '🔌' },
        { title: '防晒衣品牌代工', desc: 'UPF50+·多色可选', tags: ['ODM', '服装', '功能'], emoji: '☀️' }
      ];
      designs.forEach(d => {
        const card = document.createElement('div');
        card.className = 'fade-in';
        card.style.cssText = 'background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--transition);cursor:pointer';
        card.innerHTML = `
          <div style="height:140px;background:linear-gradient(135deg,rgba(9,132,227,0.15),rgba(0,184,148,0.1));display:flex;align-items:center;justify-content:center;font-size:3rem">${d.emoji}</div>
          <div style="padding:14px">
            <div style="font-weight:700;color:var(--text-bright);margin-bottom:6px">${d.title}</div>
            <div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:10px">${d.desc}</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap">${d.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    })();

    // Mix & Match
    (function() {
      const container = document.getElementById('mixMatch');
      const combos = [
        { name: '春夏女装爆款组合', items: ['新中式连衣裙×200', '极简T恤×500', '碎花半裙×300'], emoji: '🌸', saving: '¥12,800' },
        { name: '运动户外热销包', items: ['飞织运动鞋×200', '速干T恤×500', '运动裤×300'], emoji: '🏃', saving: '¥8,500' },
        { name: '数码配件批量方案', items: ['蓝牙耳机×1000', '数据线×5000', '充电宝×500'], emoji: '📱', saving: '¥15,200' }
      ];
      combos.forEach(c => {
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;gap:12px;padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px';
        div.innerHTML = `
          <div style="width:60px;height:60px;border-radius:8px;background:linear-gradient(135deg,rgba(9,132,227,0.15),rgba(0,184,148,0.1));display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">${c.emoji}</div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span style="font-weight:600;color:var(--text-bright)">${c.name}</span>
              <span class="badge badge-accent">省${c.saving}</span>
            </div>
            <div style="display:flex;gap:4px;flex-wrap:wrap">${c.items.map(i => `<span class="tag">${i}</span>`).join('')}</div>
          </div>
        `;
        container.appendChild(div);
      });
    })();

    // Color Tool
    (function() {
      const container = document.getElementById('colorTool');
      container.innerHTML = `
        <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center;padding:20px">
          <div style="text-align:center"><div style="width:80px;height:80px;border-radius:50%;background:#0984E3;margin:0 auto 8px;box-shadow:0 0 15px #0984E350"></div><div style="font-size:0.75rem;color:var(--text-bright)">主色</div><div style="font-size:0.65rem;color:var(--text-secondary)">#0984E3</div></div>
          <div style="font-size:1.5rem;color:var(--text-secondary)">+</div>
          <div style="text-align:center"><div style="width:80px;height:80px;border-radius:50%;background:#00B894;margin:0 auto 8px;box-shadow:0 0 15px #00B89450"></div><div style="font-size:0.75rem;color:var(--text-bright)">辅色</div><div style="font-size:0.65rem;color:var(--text-secondary)">#00B894</div></div>
          <div style="font-size:1.5rem;color:var(--text-secondary)">+</div>
          <div style="text-align:center"><div style="width:80px;height:80px;border-radius:50%;background:#F8F0E3;margin:0 auto 8px;box-shadow:0 0 15px #F8F0E350"></div><div style="font-size:0.75rem;color:var(--text-bright)">点缀</div><div style="font-size:0.65rem;color:var(--text-secondary)">#F8F0E3</div></div>
        </div>
        <div style="text-align:center;padding:0 20px 10px">
          <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:12px">AI推荐配色：科技蓝+生态绿+暖白，适用于春夏批发新品</p>
          <button class="btn btn-primary btn-sm">🎨 生成更多配色</button>
        </div>
      `;
    })();

    // Palettes
    (function() {
      const grid = document.getElementById('paletteGrid');
      const palettes = [
        { name: '科技蓝绿', colors: ['#0984E3', '#74B9FF', '#00B894', '#55EFC4', '#E8F8F5'] },
        { name: '暖阳大地', colors: ['#E17055', '#FDCB6E', '#F8C291', '#E55039', '#FBEAA5'] },
        { name: '极简黑白', colors: ['#2C3E50', '#7F8C8D', '#BDC3C7', '#ECF0F1', '#FFFFFF'] },
        { name: '活力撞色', colors: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'] }
      ];
      palettes.forEach(p => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:4px;margin-bottom:12px;align-items:center';
        row.innerHTML = `<span style="min-width:80px;font-size:0.8rem;color:var(--text-bright)">${p.name}</span>${p.colors.map(c => `<div style="width:40px;height:40px;border-radius:8px;background:${c};cursor:pointer;transition:var(--transition);border:2px solid transparent" onmouseover="this.style.borderColor='#fff';this.style.transform='scale(1.15)'" onmouseout="this.style.borderColor='transparent';this.style.transform='scale(1)'"></div>`).join('')}<button class="btn btn-ghost btn-sm" style="margin-left:8px">📋</button>`;
        grid.appendChild(row);
      });
    })();

    // Material Library
    (function() {
      const grid = document.getElementById('materialGrid');
      const materials = [
        { emoji: '🧵', label: '纯棉面料', price: '¥12-18/米', category: '棉' },
        { emoji: '✨', label: '真丝缎面', price: '¥85-120/米', category: '丝' },
        { emoji: '🌊', label: '速干涤纶', price: '¥8-15/米', category: '化纤' },
        { emoji: '❄️', label: '冰丝凉感', price: '¥15-25/米', category: '功能' },
        { emoji: '🌿', label: '有机棉', price: '¥18-28/米', category: '棉' },
        { emoji: '🛡️', label: '防水面料', price: '¥20-35/米', category: '功能' },
        { emoji: '🔥', label: '摇粒绒', price: '¥15-22/米', category: '化纤' },
        { emoji: '💎', label: '醋酸面料', price: '¥45-65/米', category: '丝' }
      ];
      materials.forEach(m => {
        const card = document.createElement('div');
        card.style.cssText = 'background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:var(--transition);cursor:pointer';
        card.innerHTML = `
          <div style="height:100px;background:linear-gradient(135deg,rgba(9,132,227,0.1),rgba(0,184,148,0.08));display:flex;align-items:center;justify-content:center;font-size:2.5rem">${m.emoji}</div>
          <div style="padding:12px">
            <div style="font-weight:600;color:var(--text-bright);font-size:0.85rem">${m.label}</div>
            <div style="font-size:0.75rem;color:var(--accent);margin-top:4px">${m.price}</div>
            <span class="badge badge-primary" style="margin-top:6px">${m.category}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    })();

    document.querySelectorAll('.tag').forEach(tag => {
      tag.addEventListener('click', function() {
        const siblings = this.parentElement.querySelectorAll('.tag');
        siblings.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });

    Utils.initSidebar();
  </script>
</body>
</html>
